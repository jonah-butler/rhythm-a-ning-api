services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../../.env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhythm -d rhythmdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: